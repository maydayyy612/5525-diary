<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5525 TOUR MEMORY OS V10</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
background:#05050a;
color:#fff;
overflow-x:hidden;
}

/* ===== 顶部导航 ===== */
header{
position:sticky;
top:0;
z-index:10;
background:rgba(10,10,20,.75);
backdrop-filter: blur(12px);
padding:10px;
}

.nav{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.tab{
padding:6px 10px;
border-radius:999px;
background:#1a1a26;
font-size:12px;
opacity:.6;
cursor:pointer;
}
.tab.active{background:#ff2d55;opacity:1}

/* ===== 容器 ===== */
.container{padding:14px;padding-bottom:120px}

/* ===== 卡片 ===== */
.card{
background:linear-gradient(135deg,#1a1a26,#0e0e18);
padding:12px;
border-radius:14px;
margin-bottom:12px;
border:1px solid #222;
}

/* ===== 输入 ===== */
input,textarea,select{
width:100%;
margin-top:6px;
padding:10px;
border-radius:10px;
border:none;
background:#141420;
color:#fff;
}

/* ===== 按钮 ===== */
button{
padding:10px;
border:none;
border-radius:10px;
background:#ff2d55;
color:#fff;
cursor:pointer;
}

/* ===== 模块隐藏 ===== */
.view{display:none}
.view.active{display:block}

/* ===== timeline ===== */
.timeline{
border-left:2px solid #ff2d55;
padding-left:14px;
}

.item{margin-bottom:12px;cursor:pointer}
.dot{
position:absolute;
left:-18px;
width:10px;height:10px;
border-radius:50%;
background:#ff2d55;
box-shadow:0 0 10px #ff2d55;
}

/* ===== map ===== */
.map{
height:300px;
border-radius:14px;
background:radial-gradient(circle,#111,#05050a);
position:relative;
overflow:hidden;
}

.city{
position:absolute;
padding:6px 10px;
border-radius:999px;
background:#ff2d55;
font-size:12px;
transform:translate(-50%,-50%);
}

/* ===== stats ===== */
.stat{
padding:10px;
background:#141420;
border-radius:12px;
margin-bottom:10px;
}

/* ===== gallery ===== */
.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}
.gallery img{
width:100%;
border-radius:12px;
}

/* ===== modal ===== */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
padding:20px;
z-index:99;
overflow:auto;
}

.close{
position:fixed;
top:20px;
right:20px;
width:40px;height:40px;
border-radius:50%;
background:#ff2d55;
border:none;
color:#fff;
}
</style>
</head>

<body>

<header>
<div class="nav">
<div class="tab active" onclick="switchView('home')">首页</div>
<div class="tab" onclick="switchView('records')">记录</div>
<div class="tab" onclick="switchView('timeline')">时间轴</div>
<div class="tab" onclick="switchView('gallery')">相册</div>
<div class="tab" onclick="switchView('map')">地图</div>
<div class="tab" onclick="switchView('stats')">统计</div>
<div class="tab" onclick="switchView('recap')">年度</div>
</div>
</header>

<div class="container">

<!-- ================= HOME ================= -->
<div id="home" class="view active"></div>

<!-- ================= RECORDS ================= -->
<div id="records" class="view">
<div class="card">
<h3>➕ 新增演出</h3>
<input id="title" placeholder="演出名称">
<input id="city" placeholder="城市">
<input id="date" type="date">
<select id="mood">
<option>✨ 感动</option>
<option>🔥 爆炸</option>
<option>🎧 沉浸</option>
<option>🌙 平静</option>
</select>

<textarea id="note" placeholder="回忆"></textarea>

<input type="file" id="imgFile" accept="image/*">

<button onclick="add()">保存</button>
</div>
</div>

<!-- ================= TIMELINE ================= -->
<div id="timeline" class="view">
<div id="timelineBox" class="timeline"></div>
</div>

<!-- ================= GALLERY ================= -->
<div id="gallery" class="view">
<div id="galleryBox" class="gallery"></div>
</div>

<!-- ================= MAP ================= -->
<div id="map" class="view">
<div id="mapBox" class="map"></div>
</div>

<!-- ================= STATS ================= -->
<div id="stats" class="view"></div>

<!-- ================= RECAP ================= -->
<div id="recap" class="view"></div>

</div>

<!-- modal -->
<div class="modal" id="modal">
<button class="close" onclick="closeModal()">×</button>
<div id="modalContent"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("v10") || "[]");

function save(){
localStorage.setItem("v10",JSON.stringify(data));
}

/* ===== 图片上传 ===== */
let tempImg="";
document.getElementById("imgFile").addEventListener("change",e=>{
let reader=new FileReader();
reader.onload=()=>tempImg=reader.result;
reader.readAsDataURL(e.target.files[0]);
});

/* ===== 添加 ===== */
function add(){
const t=document.getElementById("title").value;
const c=document.getElementById("city").value;
const d=document.getElementById("date").value;
const m=document.getElementById("mood").value;
const n=document.getElementById("note").value;

if(!t||!c)return;

data.unshift({title:t,city:c,date:d,mood:m,note:n,img:tempImg});
tempImg="";
save();
renderAll();
}

/* ===== 切换 ===== */
function switchView(v){
document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));

document.getElementById(v).classList.add("active");
event.target.classList.add("active");

renderAll();
}

/* ===== HOME ===== */
function renderHome(){
const h=document.getElementById("home");

let last=data[0];

h.innerHTML=`
<div class="card">
<h2>🎭 最近演出</h2>
${last?`
<b>${last.title}</b>
<div>📍 ${last.city}</div>
<div>${last.date||""}</div>
<div>${last.mood}</div>
`:"暂无数据"}
</div>

<div class="card">
<h3>🔥 高光回忆</h3>
${data.slice(0,3).map(d=>`<div>• ${d.title} - ${d.city}</div>`).join("")}
</div>

<div class="card">
<h3>📊 快速统计</h3>
<div>场次：${data.length}</div>
<div>城市：${new Set(data.map(d=>d.city)).size}</div>
</div>
`;
}

/* ===== RECORDS ===== */

/* ===== TIMELINE ===== */
function renderTimeline(){
const box=document.getElementById("timelineBox");
box.innerHTML="";
data.forEach((d,i)=>{
box.innerHTML+=`
<div class="item" onclick="openModal(${i})">
<div class="card">
<b>${d.title}</b>
<div>📍 ${d.city}</div>
<div>${d.date||""}</div>
<div>${d.mood}</div>
</div>
</div>`;
});
}

/* ===== GALLERY ===== */
function renderGallery(){
const box=document.getElementById("galleryBox");
box.innerHTML="";
data.filter(d=>d.img).forEach(d=>{
box.innerHTML+=`<img src="${d.img}">`;
});
}

/* ===== MAP ===== */
function renderMap(){
const box=document.getElementById("mapBox");
box.innerHTML="";

let cities=[...new Set(data.map(d=>d.city))];

let pos={};
cities.forEach((c,i)=>{
let x=60+(i*70)%260;
let y=80+Math.floor(i/4)*80;
pos[c]={x,y};

box.innerHTML+=`<div class="city" style="left:${x}px;top:${y}px">${c}</div>`;
});
}

/* ===== STATS ===== */
function renderStats(){
const box=document.getElementById("stats");

let cityCount={};
data.forEach(d=>{
cityCount[d.city]=(cityCount[d.city]||0)+1;
});

let topCity=Object.entries(cityCount).sort((a,b)=>b[1]-a[1])[0];

box.innerHTML=`
<div class="stat">🎤 总场次：${data.length}</div>
<div class="stat">🌍 城市数：${Object.keys(cityCount).length}</div>
<div class="stat">🏆 最常城市：${topCity?topCity[0]:"-"}</div>
`;
}

/* ===== RECAP ===== */
function renderRecap(){
const box=document.getElementById("recap");

box.innerHTML=`
<div class="card">
<h2>🌌 年度回顾</h2>
<p>你这一年共走过 ${new Set(data.map(d=>d.city)).size} 个城市，记录了 ${data.length} 场演出。</p>
<p>这是你的巡演记忆轨迹。</p>
</div>
`;
}

/* ===== MODAL ===== */
function openModal(i){
const d=data[i];
document.getElementById("modal").style.display="block";
document.getElementById("modalContent").innerHTML=`
<h2>${d.title}</h2>
<div>${d.city}</div>
<div>${d.date||""}</div>
<p>${d.note||""}</p>
${d.img?`<img src="${d.img}" style="width:100%">`:""}
`;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* ===== render all ===== */
function renderAll(){
renderHome();
renderTimeline();
renderGallery();
renderMap();
renderStats();
renderRecap();
}

renderAll();

</script>

</body>
</html>
