<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5525 TOUR MEMORY OS V14</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
background:#05050a;
color:#fff;
}

/* ================= header ================= */
header{
position:sticky;
top:0;
background:rgba(10,10,20,.85);
backdrop-filter: blur(10px);
padding:10px;
z-index:10;
}

.tabs{display:flex;flex-wrap:wrap;gap:6px}

.tab{
padding:6px 10px;
border-radius:999px;
background:#1a1a26;
font-size:12px;
opacity:.6;
cursor:pointer;
}
.tab.active{background:#ff2d55;opacity:1}

/* ================= layout ================= */
.container{padding:14px;padding-bottom:120px}
.view{display:none}
.view.active{display:block}

/* ================= card ================= */
.card{
background:#141420;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

/* ================= input ================= */
input,textarea{
width:100%;
margin-top:6px;
padding:10px;
border-radius:10px;
border:none;
background:#1a1a26;
color:#fff;
}

/* ================= button ================= */
button{
padding:8px 10px;
border:none;
border-radius:8px;
background:#ff2d55;
color:#fff;
cursor:pointer;
font-size:12px;
}

/* ================= timeline ================= */
.timeline{border-left:2px solid #ff2d55;padding-left:12px}
.item{margin-bottom:10px}

.summary{cursor:pointer}
.detail{display:none;margin-top:8px;font-size:13px;opacity:.9}

.thumb{width:100%;border-radius:10px;margin-top:6px}

/* ================= gallery ================= */
.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
}
.gallery img{width:100%;border-radius:10px}

/* ================= map ================= */
.map{
position:relative;
height:420px;
background:#0b0b12;
border-radius:12px;
overflow:hidden;
}

svg{
position:absolute;
width:100%;
height:100%;
opacity:.35;
}

.city{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:#ff2d55;
transform:translate(-50%,-50%);
box-shadow:0 0 10px #ff2d55;
cursor:pointer;
}

.tip{
position:absolute;
background:#111;
padding:8px 10px;
border-radius:8px;
font-size:12px;
display:none;
}

/* ================= filter ================= */
.filterBar{
display:flex;
gap:6px;
margin-bottom:10px;
}

/* ================= stats ================= */
.stat{
background:#141420;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}
.small{opacity:.7;font-size:12px}
</style>
</head>

<body>

<header>
<div class="tabs">
<div class="tab active" onclick="switchTab('home')">首页</div>
<div class="tab" onclick="switchTab('records')">记录</div>
<div class="tab" onclick="switchTab('timeline')">时间轴</div>
<div class="tab" onclick="switchTab('gallery')">相册</div>
<div class="tab" onclick="switchTab('map')">地图</div>
<div class="tab" onclick="switchTab('stats')">统计</div>
</div>
</header>

<div class="container">

<!-- ================= HOME ================= -->
<div id="home" class="view active"></div>

<!-- ================= RECORDS ================= -->
<div id="records" class="view">
<div class="card">

<input id="title" placeholder="演出名称">
<input id="city" placeholder="城市">
<input id="date" type="date">

<input id="price" placeholder="票价">
<input id="seat" placeholder="座位">
<input id="guest" placeholder="嘉宾">
<input id="transport" placeholder="交通方式（手动）">

<textarea id="setlist" placeholder="歌单（每行一首）"></textarea>
<textarea id="note" placeholder="重要小事"></textarea>

<input type="file" id="img">

<button onclick="add()">保存</button>

</div>
</div>

<!-- ================= TIMELINE ================= -->
<div id="timeline" class="view">
<div class="filterBar">
<input id="cityFilter" placeholder="按城市筛选" oninput="renderAll()">
<input id="songSearch" placeholder="按歌名搜索" oninput="renderAll()">
</div>
<div id="timelineBox" class="timeline"></div>
</div>

<!-- ================= GALLERY ================= -->
<div id="gallery" class="view">
<div id="galleryBox" class="gallery"></div>
</div>

<!-- ================= MAP ================= -->
<div id="map" class="view">
<div class="map" id="mapBox">

<svg viewBox="0 0 100 100">
<path d="M20,15 L80,20 L90,50 L70,85 L40,80 L20,60 Z"
fill="#fff"/>
</svg>

<div id="cityDots"></div>
<div class="tip" id="tip"></div>

</div>
</div>

<!-- ================= STATS ================= -->
<div id="stats" class="view"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("v14") || "[]");

/* ================= save ================= */
function save(){
localStorage.setItem("v14",JSON.stringify(data));
}

/* ================= image ================= */
let imgData="";
document.getElementById("img").addEventListener("change",e=>{
let r=new FileReader();
r.onload=()=>imgData=r.result;
r.readAsDataURL(e.target.files[0]);
});

/* ================= CRUD ================= */
function add(){
data.unshift({
id:Date.now(),
title:val("title"),
city:val("city"),
date:val("date"),
price:val("price"),
seat:val("seat"),
guest:val("guest"),
transport:val("transport"),
setlist:val("setlist").split("\n").filter(s=>s),
note:val("note"),
img:imgData
});
imgData="";
save();
renderAll();
}

/* 编辑 */
function edit(id){
let d=data.find(x=>x.id===id);

fill("title",d.title);
fill("city",d.city);
fill("date",d.date);
fill("price",d.price);
fill("seat",d.seat);
fill("guest",d.guest);
fill("transport",d.transport);
fill("setlist",d.setlist.join("\n"));
fill("note",d.note);

data=data.filter(x=>x.id!==id);
save();
renderAll();
}

/* 删除 */
function del(id){
data=data.filter(d=>d.id!==id);
save();
renderAll();
}

function val(id){return document.getElementById(id).value}
function fill(id,v){document.getElementById(id).value=v||""}

/* ================= switch ================= */
function switchTab(t){
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.getElementById(t).classList.add("active");
}

/* ================= HOME ================= */
function renderHome(){
let h=document.getElementById("home");
let last=data[0];

h.innerHTML=`
<div class="card">
<h3>最近演出</h3>
${last?`
<b>${last.title}</b><br>
📍 ${last.city}<br>
🚆 ${last.transport||""}
`:"暂无"}
</div>

<div class="card">
总场次：${data.length}<br>
城市数：${new Set(data.map(d=>d.city)).size}
</div>
`;
}

/* ================= TIMELINE ================= */
function renderTimeline(){
let box=document.getElementById("timelineBox");
box.innerHTML="";

let cityF=document.getElementById("cityFilter")?.value?.toLowerCase()||"";
let songF=document.getElementById("songSearch")?.value?.toLowerCase()||"";

data.filter(d=>{
return (!cityF||d.city?.toLowerCase().includes(cityF))
&& (!songF||d.setlist?.join(" ").toLowerCase().includes(songF));
}).forEach(d=>{

box.innerHTML+=`
<div class="item">
<div class="card summary" onclick="toggle(this)">
<b>${d.title}</b><br>
📍 ${d.city}
<br>
<button onclick="event.stopPropagation();edit(${d.id})">编辑</button>
<button onclick="event.stopPropagation();del(${d.id})">删除</button>
</div>

<div class="detail">
📅 ${d.date||""}<br>
🎤 ${d.guest||""}<br>
🚆 ${d.transport||""}<br>

<div class="card">
${d.setlist.map(s=>"🎧 "+s).join("<br>")}
</div>

<p>${d.note||""}</p>

${d.img?`<img class="thumb" src="${d.img}">`:""}
</div>
</div>`;
});
}

function toggle(el){
let d=el.nextElementSibling;
d.style.display=d.style.display==="block"?"none":"block";
}

/* ================= GALLERY ================= */
function renderGallery(){
let box=document.getElementById("galleryBox");
box.innerHTML="";
data.filter(d=>d.img).forEach(d=>{
box.innerHTML+=`<img src="${d.img}">`;
});
}

/* ================= MAP ================= */
function renderMap(){
let box=document.getElementById("cityDots");
box.innerHTML="";

let map={
"北京":{x:52,y:35,km:0},
"上海":{x:75,y:60,km:1060},
"广州":{x:55,y:85,km:1900},
"成都":{x:40,y:60,km:1800}
};

data.forEach(d=>{
let c=map[d.city];
if(!c) return;

let dot=document.createElement("div");
dot.className="city";
dot.style.left=c.x+"%";
dot.style.top=c.y+"%";

dot.onclick=()=>{
alert(
`城市：${d.city}\n交通：${d.transport}\n距离北京：${c.km}km`
);
};

box.appendChild(dot);
});
}

/* ================= STATS ================= */
function renderStats(){
let box=document.getElementById("stats");

let cityCount={};
data.forEach(d=>{
cityCount[d.city]=(cityCount[d.city]||0)+1;
});

box.innerHTML=`
<div class="stat">总场次：${data.length}</div>
<div class="stat">城市数：${Object.keys(cityCount).length}</div>
`;
}

/* ================= render ================= */
function renderAll(){
renderHome();
renderTimeline();
renderGallery();
renderMap();
renderStats();
}

renderAll();

</script>

</body>
</html>
