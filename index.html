<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>5525 演出人生 V6</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js");
  });
}
</script>

<style>

/* ===== 基础 ===== */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
    background:#0a0a0f;
    color:#fff;
}

/* ===== 启动页（升级版舞台感） ===== */
#splash{
    position:fixed;
    inset:0;
    background: radial-gradient(circle at 50% 40%, #3a000a, #000);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation: fadeOut 2.8s ease 2.8s forwards;
}

.logo{
    font-size:28px;
    font-weight:700;
    letter-spacing:3px;
    text-shadow:0 0 20px rgba(255,0,60,0.5);
    animation: glow 1.5s ease-in-out infinite alternate;
}

.sub{
    margin-top:10px;
    opacity:0.7;
    font-size:13px;
}

@keyframes glow{
    from{transform:scale(1); opacity:0.7;}
    to{transform:scale(1.05); opacity:1;}
}

@keyframes fadeOut{
    to{opacity:0; visibility:hidden;}
}

/* ===== header ===== */
header{
    padding:18px;
    font-size:18px;
    font-weight:600;
    background:#120006;
    position:sticky;
    top:0;
    border-bottom:1px solid #2a0a12;
}

/* ===== layout ===== */
.container{padding:16px;}

.card{
    background:#14141c;
    padding:14px;
    border-radius:16px;
    margin-bottom:14px;
    border:1px solid #2a0a12;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* ===== input ===== */
input,textarea,select{
    width:100%;
    margin-top:6px;
    margin-bottom:10px;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#1f1f2a;
    color:white;
}

/* ===== buttons ===== */
button{
    padding:10px 12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.btn-add{background:#ff0033;color:#fff;}
.btn-del{background:#333;color:#fff;}
.btn-edit{background:#2d7dff;color:#fff;}

/* ===== timeline ===== */
.timeline{
    position:relative;
    padding-left:16px;
    border-left:2px solid #ff0033;
}

.item{
    margin-bottom:14px;
    position:relative;
}

.dot{
    position:absolute;
    left:-20px;
    top:12px;
    width:10px;
    height:10px;
    border-radius:50%;
    background:#ff0033;
    box-shadow:0 0 10px #ff0033;
}

.item-card{
    background:#14141c;
    padding:12px;
    border-radius:14px;
    border:1px solid #2a0a12;
}

.title{
    font-size:16px;
    font-weight:600;
}

.meta{
    font-size:12px;
    opacity:0.75;
    margin-top:4px;
}

.mood{
    display:inline-block;
    margin-top:6px;
    font-size:12px;
    padding:4px 8px;
    border-radius:8px;
    background:#ff0033;
}
</style>
</head>

<body>

<!-- 🔥 启动页 -->
<div id="splash">
    <div class="logo">5525 回到那一天</div>
    <div class="sub">Live Memory · Your Concert Timeline</div>
</div>

<header>🎭 5525 演出人生 V6</header>

<div class="container">

<div class="card">
<h3>➕ 添加演出</h3>

<input id="title" placeholder="演出名称">
<input id="city" placeholder="城市 / 场馆">
<input id="date" type="date">

<select id="mood">
<option value="✨ 感动">✨ 感动</option>
<option value="🔥 爆炸">🔥 爆炸</option>
<option value="🎧 沉浸">🎧 沉浸</option>
<option value="🌙 平静">🌙 平静</option>
</select>

<textarea id="note" placeholder="记忆 / 心情"></textarea>

<button class="btn-add" onclick="addShow()">保存演出</button>
</div>

<div class="card">
<input id="search" placeholder="🔍 搜索演出 / 城市" oninput="render()">
</div>

<div id="list" class="timeline"></div>

</div>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
}, 2800);

let shows = JSON.parse(localStorage.getItem("shows") || "[]");

function save(){
    localStorage.setItem("shows", JSON.stringify(shows));
}

function addShow(){
    let title = document.getElementById("title").value;
    let city = document.getElementById("city").value;
    let date = document.getElementById("date").value;
    let note = document.getElementById("note").value;
    let mood = document.getElementById("mood").value;

    if(!title) return;

    shows.unshift({title,city,date,note,mood});
    save();
    render();
}

function deleteShow(i){
    shows.splice(i,1);
    save();
    render();
}

function editShow(i){
    let s = shows[i];

    shows[i] = {
        title: prompt("名称", s.title),
        city: prompt("城市", s.city),
        date: prompt("日期", s.date),
        note: prompt("心情", s.note),
        mood: s.mood
    };

    save();
    render();
}

function render(){
    let list = document.getElementById("list");
    let key = document.getElementById("search").value?.toLowerCase() || "";

    list.innerHTML="";

    shows.filter(s =>
        (s.title||"").toLowerCase().includes(key) ||
        (s.city||"").toLowerCase().includes(key)
    ).forEach((s,i)=>{
        list.innerHTML += `
        <div class="item">
            <div class="dot"></div>
            <div class="item-card">
                <div class="title">${s.title}</div>
                <div class="meta">📍 ${s.city||""}</div>
                <div class="meta">📅 ${s.date||""}</div>
                <div class="mood">${s.mood||""}</div>
                <div class="meta">${s.note||""}</div>

                <div style="margin-top:10px;">
                    <button class="btn-edit" onclick="editShow(${i})">编辑</button>
                    <button class="btn-del" onclick="deleteShow(${i})">删除</button>
                </div>
            </div>
        </div>`;
    });
}

render();
</script>

</body>
</html>
