<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5525 TOUR MEMORY OS V13</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
background:#05050a;
color:#fff;
}

/* ===== header ===== */
header{
position:sticky;
top:0;
background:rgba(10,10,20,.8);
backdrop-filter: blur(10px);
padding:10px;
z-index:10;
}

.tabs{display:flex;flex-wrap:wrap;gap:6px}
.tab{
padding:6px 10px;
border-radius:999px;
background:#1a1a26;
font-size:12px;
opacity:.6;
cursor:pointer;
}
.tab.active{background:#ff2d55;opacity:1}

.container{padding:14px;padding-bottom:120px}

.view{display:none}
.view.active{display:block}

/* ===== card ===== */
.card{
background:#141420;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

/* ===== input ===== */
input,textarea{
width:100%;
margin-top:6px;
padding:10px;
border-radius:10px;
border:none;
background:#1a1a26;
color:#fff;
}

/* ===== button ===== */
button{
padding:10px;
border:none;
border-radius:10px;
background:#ff2d55;
color:#fff;
cursor:pointer;
}

/* ===== timeline ===== */
.timeline{
border-left:2px solid #ff2d55;
padding-left:12px;
}

.item{margin-bottom:10px}
.summary{cursor:pointer}
.detail{
display:none;
margin-top:8px;
font-size:13px;
opacity:.9;
}
.thumb{width:100%;border-radius:10px;margin-top:6px}

/* ===== song list ===== */
.songBox{
max-height:140px;
overflow:auto;
padding:8px;
background:#0f0f18;
border-radius:10px;
}

/* ===== map ===== */
.map{
position:relative;
height:420px;
background:#0b0b12;
border-radius:12px;
overflow:hidden;
}

svg{
position:absolute;
width:100%;
height:100%;
opacity:.35;
}

.city{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:#ff2d55;
transform:translate(-50%,-50%);
box-shadow:0 0 10px #ff2d55;
cursor:pointer;
}

.tip{
position:absolute;
background:#111;
padding:8px 10px;
border-radius:8px;
font-size:12px;
display:none;
}
.small{opacity:.7;font-size:12px}
</style>
</head>

<body>

<header>
<div class="tabs">
<div class="tab active" onclick="switchTab('records')">记录</div>
<div class="tab" onclick="switchTab('timeline')">时间轴</div>
<div class="tab" onclick="switchTab('map')">地图</div>
</div>
</header>

<div class="container">

<!-- ================= RECORDS ================= -->
<div id="records" class="view active">
<div class="card">

<input id="title" placeholder="演出名称">
<input id="city" placeholder="城市">
<input id="date" type="date">

<input id="price" placeholder="票价">
<input id="seat" placeholder="座位">
<input id="guest" placeholder="嘉宾">
<input id="transport" placeholder="交通方式（手动）">

<textarea id="setlist" placeholder="歌单（每行一首）"></textarea>
<textarea id="note" placeholder="重要小事"></textarea>

<input type="file" id="img">

<button onclick="add()">保存</button>

</div>
</div>

<!-- ================= TIMELINE ================= -->
<div id="timeline" class="view">
<div id="timelineBox" class="timeline"></div>
</div>

<!-- ================= MAP ================= -->
<div id="map" class="view">
<div class="map" id="mapBox">

<svg viewBox="0 0 100 100">
<path d="M20,15 L80,20 L90,50 L70,85 L40,80 L20,60 Z"
fill="#fff"/>
</svg>

<div id="cityDots"></div>
<div class="tip" id="tip"></div>

</div>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("v13") || "[]");

/* ================= save ================= */
function save(){
localStorage.setItem("v13",JSON.stringify(data));
}

/* ================= image ================= */
let imgData="";
document.getElementById("img").addEventListener("change",e=>{
let r=new FileReader();
r.onload=()=>imgData=r.result;
r.readAsDataURL(e.target.files[0]);
});

/* ================= CRUD ================= */
function add(){
data.unshift({
id:Date.now(),
title:val("title"),
city:val("city"),
date:val("date"),
price:val("price"),
seat:val("seat"),
guest:val("guest"),
transport:val("transport"),
setlist:val("setlist").split("\n"),
note:val("note"),
img:imgData
});
imgData="";
save();
renderAll();
}

function del(id){
data=data.filter(d=>d.id!==id);
save();
renderAll();
}

function edit(id){
let d=data.find(x=>x.id===id);
document.getElementById("title").value=d.title;
document.getElementById("city").value=d.city;
document.getElementById("date").value=d.date;
document.getElementById("price").value=d.price;
document.getElementById("seat").value=d.seat;
document.getElementById("guest").value=d.guest;
document.getElementById("transport").value=d.transport;
document.getElementById("setlist").value=d.setlist.join("\n");
document.getElementById("note").value=d.note;
del(id);
}

/* ================= util ================= */
function val(id){return document.getElementById(id).value}

/* ================= switch ================= */
function switchTab(t){
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.getElementById(t).classList.add("active");
}

/* ================= timeline ================= */
function renderTimeline(){
let box=document.getElementById("timelineBox");
box.innerHTML="";

data.forEach(d=>{

box.innerHTML+=`
<div class="item">
<div class="card summary" onclick="toggle(this)">
<b>${d.title}</b><br>
📍 ${d.city}<br>
🎫 ${d.price||""}<br>
<button onclick="event.stopPropagation();edit(${d.id})">编辑</button>
<button onclick="event.stopPropagation();del(${d.id})">删除</button>
</div>

<div class="detail">
${d.date||""}<br>
🎤 ${d.guest||""}<br>
🚆 ${d.transport||""}<br>

<div class="songBox">
${(d.setlist||[]).map(s=>"🎧 "+s).join("<br>")}
</div>

<p>${d.note||""}</p>

${d.img?`<img class="thumb" src="${d.img}">`:""}
</div>
</div>`;
});
}

function toggle(el){
let d=el.nextElementSibling;
d.style.display=d.style.display==="block"?"none":"block";
}

/* ================= MAP ================= */
function renderMap(){
let box=document.getElementById("cityDots");
box.innerHTML="";

let map={
"北京":{x:52,y:35,km:0},
"上海":{x:75,y:60,km:1060},
"广州":{x:55,y:85,km:1900},
"成都":{x:40,y:60,km:1800}
};

data.forEach(d=>{
let c=map[d.city];
if(!c) return;

let dot=document.createElement("div");
dot.className="city";
dot.style.left=c.x+"%";
dot.style.top=c.y+"%";

dot.onclick=()=>{
alert(
`城市：${d.city}\n交通：${d.transport}\n距离北京：${c.km}km`
);
};

box.appendChild(dot);
});
}

/* ================= render ================= */
function renderAll(){
renderTimeline();
renderMap();
}

renderAll();

</script>

</body>
</html>
