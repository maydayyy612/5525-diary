<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5525 TOUR MEMORY OS V12</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
background:#05050a;
color:#fff;
}

/* ===== 开屏 ===== */
#intro{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOut 4s ease 4s forwards;
}

.glow{
font-size:28px;
text-shadow:0 0 20px rgba(255,0,60,.6);
animation:pulse 1.5s infinite alternate;
}

@keyframes pulse{
from{transform:scale(1);opacity:.6}
to{transform:scale(1.06);opacity:1}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

/* ===== layout ===== */
header{
position:sticky;
top:0;
background:rgba(10,10,20,.75);
backdrop-filter: blur(10px);
padding:10px;
}

.tabs{display:flex;flex-wrap:wrap;gap:6px}

.tab{
padding:6px 10px;
border-radius:999px;
background:#1a1a26;
font-size:12px;
opacity:.6;
cursor:pointer;
}
.tab.active{background:#ff2d55;opacity:1}

.container{padding:14px;padding-bottom:120px}

.view{display:none}
.view.active{display:block}

/* ===== card ===== */
.card{
background:#141420;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

/* ===== input ===== */
input,textarea{
width:100%;
margin-top:6px;
padding:10px;
border-radius:10px;
border:none;
background:#1a1a26;
color:#fff;
}

/* ===== button ===== */
button{
padding:10px;
border:none;
border-radius:10px;
background:#ff2d55;
color:#fff;
cursor:pointer;
}

/* ===== timeline ===== */
.timeline{border-left:2px solid #ff2d55;padding-left:12px}
.item{margin-bottom:10px;cursor:pointer}
.thumb{width:100%;border-radius:10px;margin-top:6px}

/* ===== gallery ===== */
.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
}
.gallery img{width:100%;border-radius:10px}

/* ===== map ===== */
.map{
position:relative;
height:420px;
background:radial-gradient(circle,#111,#05050a);
border-radius:12px;
overflow:hidden;
}

.city{
position:absolute;
width:10px;height:10px;
border-radius:50%;
background:#ff2d55;
transform:translate(-50%,-50%);
cursor:pointer;
box-shadow:0 0 10px #ff2d55;
}

/* ===== search/filter ===== */
.filterBar{
display:flex;
gap:6px;
margin-bottom:10px;
}

.small{opacity:.7;font-size:12px}
</style>
</head>

<body>

<!-- 🎬 开屏 -->
<div id="intro">
  <div class="glow">5525 回到那一天</div>
  <div class="small">Tour Memory OS V12</div>
</div>

<!-- APP -->
<header>
<div class="tabs">
<div class="tab active" onclick="switchTab('home')">首页</div>
<div class="tab" onclick="switchTab('records')">记录</div>
<div class="tab" onclick="switchTab('timeline')">时间轴</div>
<div class="tab" onclick="switchTab('gallery')">相册</div>
<div class="tab" onclick="switchTab('map')">地图</div>
<div class="tab" onclick="switchTab('stats')">统计</div>
</div>
</header>

<div class="container">

<!-- HOME -->
<div id="home" class="view active"></div>

<!-- RECORDS -->
<div id="records" class="view">
<div class="card">

<input id="title" placeholder="演出名称">
<input id="city" placeholder="城市">
<input id="date" type="date">

<input id="setlist" placeholder="歌单（用逗号分隔）">
<input id="guest" placeholder="嘉宾">
<input id="transport" placeholder="交通方式（手动填写）">

<textarea id="note" placeholder="重要小事"></textarea>

<input type="file" id="img">

<button onclick="add()">保存</button>

</div>
</div>

<!-- TIMELINE -->
<div id="timeline" class="view">
<div class="filterBar">
<input id="cityFilter" placeholder="按城市筛选" oninput="renderAll()">
<input id="songSearch" placeholder="按歌名搜索" oninput="renderAll()">
</div>
<div id="timelineBox" class="timeline"></div>
</div>

<!-- GALLERY -->
<div id="gallery" class="view">
<div id="galleryBox" class="gallery"></div>
</div>

<!-- MAP -->
<div id="map" class="view">
<div class="map" id="mapBox"></div>
</div>

<!-- STATS -->
<div id="stats" class="view"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("v12") || "[]");

setTimeout(()=>{
document.getElementById("intro").style.display="none";
},4500);

function save(){
localStorage.setItem("v12",JSON.stringify(data));
}

/* ===== img ===== */
let imgData="";
document.getElementById("img").addEventListener("change",e=>{
let r=new FileReader();
r.onload=()=>imgData=r.result;
r.readAsDataURL(e.target.files[0]);
});

/* ===== add ===== */
function add(){
data.unshift({
title:val("title"),
city:val("city"),
date:val("date"),
setlist:val("setlist"),
guest:val("guest"),
transport:val("transport"),
note:val("note"),
img:imgData
});
imgData="";
save();
renderAll();
}

/* ===== util ===== */
function val(id){return document.getElementById(id).value}

/* ===== switch ===== */
function switchTab(t){
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.querySelectorAll(".tab").forEach(v=>v.classList.remove("active"));

document.getElementById(t).classList.add("active");
event.target.classList.add("active");

renderAll();
}

/* ===== HOME ===== */
function renderHome(){
let h=document.getElementById("home");
let last=data[0];

h.innerHTML=`
<div class="card">
<h3>最近演出</h3>
${last?`
<b>${last.title}</b><br>
📍 ${last.city}<br>
🚆 ${last.transport||""}
`:"暂无"}
</div>

<div class="card">
总场次：${data.length}
</div>
`;
}

/* ===== TIMELINE ===== */
function renderTimeline(){
let box=document.getElementById("timelineBox");
box.innerHTML="";

let cityF=document.getElementById("cityFilter")?.value?.toLowerCase()||"";
let songF=document.getElementById("songSearch")?.value?.toLowerCase()||"";

data.filter(d=>{
let okCity=!cityF||d.city?.toLowerCase().includes(cityF);
let okSong=!songF||d.setlist?.toLowerCase().includes(songF);
return okCity&&okSong;
}).forEach(d=>{

box.innerHTML+=`
<div class="item">
<div class="card">
<b>${d.title}</b><br>
📍 ${d.city}<br>
🎧 ${d.setlist||""}<br>
🚆 ${d.transport||""}
${d.img?`<img class="thumb" src="${d.img}">`:""}
</div>
</div>`;
});
}

/* ===== GALLERY ===== */
function renderGallery(){
let box=document.getElementById("galleryBox");
box.innerHTML="";
data.filter(d=>d.img).forEach(d=>{
box.innerHTML+=`<img src="${d.img}">`;
});
}

/* ===== MAP (城市点亮 + 交通信息) ===== */
function renderMap(){
let map=document.getElementById("mapBox");
map.innerHTML="";

let cityMap={
"北京":{x:50,y:40},
"上海":{x:70,y:65},
"广州":{x:55,y:85},
"成都":{x:40,y:60}
};

data.forEach(d=>{
let c=cityMap[d.city];
if(!c) return;

let div=document.createElement("div");
div.className="city";
div.style.left=c.x+"%";
div.style.top=c.y+"%";

div.onclick=()=>{
alert(
`城市：${d.city}\n交通：${d.transport}\n距离北京：约 ${calcDistance(d.city)} km`
);
};

map.appendChild(div);
});
}

/* 简化距离 */
function calcDistance(city){
let map={
"上海":1060,
"广州":1900,
"成都":1800,
"北京":0
};
return map[city]||"未知";
}

/* ===== STATS ===== */
function renderStats(){
let box=document.getElementById("stats");

let cityCount={};
data.forEach(d=>{
cityCount[d.city]=(cityCount[d.city]||0)+1;
});

box.innerHTML=`
<div class="card">总场次 ${data.length}</div>
<div class="card">城市数 ${Object.keys(cityCount).length}</div>
`;
}

/* ===== render all ===== */
function renderAll(){
renderHome();
renderTimeline();
renderGallery();
renderMap();
renderStats();
}

renderAll();

</script>

</body>
</html>
