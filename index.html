<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0a0c">
<title>5525·DIARY</title>
<meta name="description" content="5525-dairy · 私人演出记录档案馆">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Bebas+Neue&family=Noto+Serif+SC:wght@400;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ 开屏 ============ -->
<div id="splash">
  <div class="splash-inner">
    <p class="splash-mark">5525</p>
    <h1 class="splash-title">回到那一天</h1>
    <p class="splash-tap">轻触屏幕，开始回忆</p>
  </div>
</div>

<!-- ============ 主应用 ============ -->
<div id="app" hidden>

  <header class="topbar">
    <span class="topbar-mark">5525</span>
    <h1 id="topbar-title" class="topbar-title">首页</h1>
    <button id="btn-search-icon" class="icon-btn" aria-label="搜索">⌕</button>
  </header>

  <main id="views">

    <!-- 首页：票根时间轴 -->
    <section id="view-home" class="view">
      <p class="view-lead">每一张票根，都是回到那一天的入口。</p>
      <div id="timeline" class="timeline"></div>
      <p id="home-empty" class="empty-hint" hidden>还没有记录 —— 点击右下角「+」添加第一场演出。</p>
    </section>

    <!-- 照片墙 -->
    <section id="view-wall" class="view" hidden>
      <p class="view-lead">所有现场的光，都留在这里。</p>
      <div id="photo-wall" class="photo-wall"></div>
      <p id="wall-empty" class="empty-hint" hidden>还没有上传照片。</p>
    </section>

    <!-- 人生地图 -->
    <section id="view-map" class="view" hidden>
      <p class="view-lead">你为音乐走过的城市。</p>
      <div class="map-wrap">
        <svg id="china-map" viewBox="0 0 860 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="中国地图 演出足迹"></svg>
      </div>
      <ul id="city-list" class="city-list"></ul>
    </section>

    <!-- 搜索 / 筛选 -->
    <section id="view-search" class="view" hidden>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="搜索歌曲或城市…">
        <div class="search-filter">
          <button class="chip active" data-filter="all">全部</button>
          <button class="chip" data-filter="song">按歌曲</button>
          <button class="chip" data-filter="city">按城市</button>
        </div>
      </div>
      <div id="search-results" class="timeline"></div>
      <p id="search-empty" class="empty-hint" hidden>没有找到匹配的演出记录。</p>
    </section>

  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="home"><span class="nav-ico">🎬</span><span>首页</span></button>
    <button class="nav-btn" data-view="wall"><span class="nav-ico">🖼</span><span>照片墙</span></button>
    <button class="nav-fab" id="btn-add" aria-label="添加演出记录">+</button>
    <button class="nav-btn" data-view="map"><span class="nav-ico">📍</span><span>人生地图</span></button>
    <button class="nav-btn" data-view="search"><span class="nav-ico">⌕</span><span>搜索</span></button>
  </nav>

</div>

<!-- ============ 新增/编辑 演出 弹层 ============ -->
<div id="modal-record" class="modal" hidden>
  <div class="modal-sheet">
    <header class="modal-head">
      <button class="modal-close" data-close="modal-record" aria-label="关闭">✕</button>
      <h2 id="record-modal-title">新增演出</h2>
      <button class="modal-save" id="btn-save-record">保存</button>
    </header>
    <form id="record-form" class="modal-body">
      <input type="hidden" id="f-id">

      <label class="field">
        <span class="field-label">演出名称 *</span>
        <input type="text" id="f-name" required placeholder="例如：落日飞车 2024 巡演">
      </label>

      <div class="field-row">
        <label class="field">
          <span class="field-label">时间 *</span>
          <input type="date" id="f-date" required>
        </label>
        <label class="field">
          <span class="field-label">票价（元）</span>
          <input type="number" id="f-price" min="0" placeholder="280">
        </label>
      </div>

      <div class="field-row">
        <label class="field">
          <span class="field-label">城市 *</span>
          <input type="text" id="f-city" required placeholder="北京">
        </label>
        <label class="field">
          <span class="field-label">场地</span>
          <input type="text" id="f-venue" placeholder="Livehouse 名称">
        </label>
      </div>

      <label class="field">
        <span class="field-label">座位</span>
        <input type="text" id="f-seat" placeholder="内场 / A区3排12号 / 站票">
      </label>

      <label class="field">
        <span class="field-label">评分</span>
        <div id="f-rating" class="rating-input" data-value="0">
          <span class="punch" data-v="1"></span>
          <span class="punch" data-v="2"></span>
          <span class="punch" data-v="3"></span>
          <span class="punch" data-v="4"></span>
          <span class="punch" data-v="5"></span>
        </div>
      </label>

      <div class="field">
        <span class="field-label">歌单 / 设置单（约 30 首）</span>
        <div class="setlist-input">
          <input type="text" id="f-song-input" placeholder="输入曲目名后按「添加」">
          <button type="button" id="btn-add-song">添加</button>
        </div>
        <ol id="f-setlist" class="setlist-edit"></ol>
      </div>

      <label class="field">
        <span class="field-label">演出记忆点</span>
        <textarea id="f-notes" rows="4" placeholder="写下这场演出最难忘的瞬间…"></textarea>
      </label>

      <div class="field">
        <span class="field-label">演出照片</span>
        <input type="file" id="f-photos" accept="image/*" multiple capture="environment">
        <div id="f-photo-preview" class="photo-preview"></div>
      </div>

      <button type="button" id="btn-delete-record" class="btn-delete" hidden>删除这场记录</button>
    </form>
  </div>
</div>

<!-- ============ 详情 弹层 ============ -->
<div id="modal-detail" class="modal" hidden>
  <div class="modal-sheet">
    <header class="modal-head">
      <button class="modal-close" data-close="modal-detail" aria-label="关闭">✕</button>
      <h2>票根详情</h2>
      <button class="modal-save" id="btn-edit-record">编辑</button>
    </header>
    <div id="detail-body" class="modal-body detail-body"></div>
  </div>
</div>

<!-- ============ 城市 编辑 弹层 ============ -->
<div id="modal-city" class="modal" hidden>
  <div class="modal-sheet modal-sheet-sm">
    <header class="modal-head">
      <button class="modal-close" data-close="modal-city" aria-label="关闭">✕</button>
      <h2 id="city-modal-title">城市</h2>
      <button class="modal-save" id="btn-save-city">保存</button>
    </header>
    <div class="modal-body">
      <input type="hidden" id="c-name">
      <label class="field">
        <span class="field-label">交通方式</span>
        <input type="text" id="c-transport" placeholder="高铁 / 飞机 / 大巴…">
      </label>
      <label class="field">
        <span class="field-label">距离北京（公里）</span>
        <input type="number" id="c-distance" min="0" placeholder="自动计算，也可手动修改">
      </label>
      <p class="field-hint" id="c-auto-distance"></p>
    </div>
  </div>
</div>

<script src="map-data.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
</body>
</html>
