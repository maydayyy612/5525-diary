<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5525 回到那一天 V9</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
background:#05050a;
color:#fff;
overflow:hidden;
}

/* ================= 开场电影 ================= */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
animation:fadeOut 4s ease 4s forwards;
}

.glow{
font-size:28px;
letter-spacing:3px;
font-weight:700;
text-shadow:0 0 25px rgba(255,0,60,0.6);
animation:pulse 1.5s ease-in-out infinite alternate;
}

.sub{
margin-top:10px;
font-size:12px;
opacity:.6;
}

@keyframes pulse{
from{transform:scale(1);opacity:.6}
to{transform:scale(1.06);opacity:1}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

/* ================= 主系统 ================= */
#app{
display:none;
height:100vh;
overflow:hidden;
}

/* 顶部 */
header{
position:fixed;
top:0;
width:100%;
padding:14px;
background:rgba(10,10,20,.6);
backdrop-filter: blur(12px);
z-index:10;
}

/* 模式 */
.tabs{
display:flex;
gap:10px;
padding:10px 14px;
margin-top:50px;
}

.tab{
padding:6px 12px;
border-radius:999px;
background:#1a1a26;
font-size:12px;
opacity:.5;
cursor:pointer;
}
.tab.active{opacity:1;background:#ff2d55}

/* 容器 */
.container{
padding:14px;
overflow:auto;
height:calc(100vh - 110px);
}

/* 卡片 */
.card{
background:linear-gradient(135deg,#1a1a26,#0e0e18);
padding:14px;
border-radius:16px;
margin-bottom:12px;
border:1px solid #222;
}

/* 输入 */
input,textarea{
width:100%;
margin-top:8px;
padding:10px;
border-radius:10px;
border:none;
background:#141420;
color:#fff;
}

/* 按钮 */
button{
padding:10px 12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff2d55;
color:#fff;
}

/* ================= 时间线 ================= */
.timeline{
border-left:2px solid #ff2d55;
padding-left:16px;
}

.item{
position:relative;
margin-bottom:14px;
cursor:pointer;
}

.dot{
position:absolute;
left:-20px;
top:10px;
width:10px;
height:10px;
border-radius:50%;
background:#ff2d55;
box-shadow:0 0 10px #ff2d55;
}

/* ================= 地图 ================= */
.map{
position:relative;
height:320px;
border-radius:16px;
background:radial-gradient(circle at center,#111,#05050a);
overflow:hidden;
}

.city{
position:absolute;
padding:6px 10px;
background:#ff2d55;
border-radius:999px;
font-size:12px;
transform:translate(-50%,-50%);
}

/* ================= 沉浸页 ================= */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
flex-direction:column;
padding:20px;
z-index:999;
overflow:auto;
}

.close{
position:fixed;
top:20px;
right:20px;
width:40px;
height:40px;
border-radius:50%;
background:#ff2d55;
border:none;
color:#fff;
}
img{width:100%;border-radius:12px;margin-top:10px}
.small{opacity:.7;font-size:12px}
</style>
</head>

<body>

<!-- 🎬 开场电影 -->
<div id="intro">
  <div class="glow">5525 回到那一天</div>
  <div class="sub">Tour Memory System · Loading Memories...</div>
</div>

<!-- 🎭 主应用 -->
<div id="app">

<header>🎭 5525 · V9 沉浸巡演电影</header>

<div class="tabs">
<div class="tab active" onclick="switchTab('timeline')">时间线</div>
<div class="tab" onclick="switchTab('map')">巡演地图</div>
</div>

<div class="container">

<!-- 输入 -->
<div class="card">
<h3>➕ 新增演出记忆</h3>
<input id="title" placeholder="演出名称"/>
<input id="city" placeholder="城市"/>
<input id="date" type="date"/>
<textarea id="note" placeholder="现场记忆"></textarea>
<input id="img" placeholder="图片链接（可选）"/>
<button onclick="add()">加入巡演</button>
</div>

<!-- 时间线 -->
<div id="timelineView"></div>

<!-- 地图 -->
<div id="mapView" style="display:none">
<div class="map" id="map"></div>
</div>

</div>

</div>

<!-- 沉浸 -->
<div class="modal" id="modal">
<button class="close" onclick="closeModal()">×</button>
<div id="modalContent"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("v9") || "[]");

function save(){
localStorage.setItem("v9",JSON.stringify(data));
}

/* 🎬 开场控制 */
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("app").style.display="block";
},4500);

/* 添加 */
function add(){
const title=document.getElementById("title").value;
const city=document.getElementById("city").value;
const date=document.getElementById("date").value;
const note=document.getElementById("note").value;
const img=document.getElementById("img").value;

if(!title||!city) return;

data.unshift({title,city,date,note,img});
save();
render();
drawMap();
}

/* 切换 */
function switchTab(t){
document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
event.target.classList.add("active");

document.getElementById("timelineView").style.display = t==="timeline"?"block":"none";
document.getElementById("mapView").style.display = t==="map"?"block":"none";
}

/* 时间线 */
function render(){
const box=document.getElementById("timelineView");
box.innerHTML="";

data.forEach((d,i)=>{
box.innerHTML+=`
<div class="item" onclick="openModal(${i})">
<div class="dot"></div>
<div class="card">
<b>${d.title}</b>
<div class="small">📍 ${d.city}</div>
<div class="small">📅 ${d.date||""}</div>
<div class="small">${d.note||""}</div>
</div>
</div>`;
});
}

/* 地图 */
function drawMap(){
const map=document.getElementById("map");
map.innerHTML="";

let cities=[...new Set(data.map(d=>d.city))];

let pos={};
cities.forEach((c,i)=>{
let x=60+(i*70)%260;
let y=70+Math.floor(i/4)*80;
pos[c]={x,y};

map.innerHTML+=`<div class="city" style="left:${x}px;top:${y}px">${c}</div>`;
});
}

/* 沉浸 */
function openModal(i){
const d=data[i];
document.getElementById("modal").style.display="flex";

document.getElementById("modalContent").innerHTML=`
<h2>${d.title}</h2>
<div class="small">📍 ${d.city}</div>
<div class="small">📅 ${d.date||""}</div>
<p style="opacity:.8">${d.note||""}</p>
${d.img?`<img src="${d.img}"/>`:""}
`;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* init */
render();
drawMap();

</script>

</body>
</html>
