<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5525 回到那一天 V8</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
background:#05050a;
color:#fff;
overflow-x:hidden;
}

/* ===== 顶部 ===== */
header{
position:sticky;
top:0;
padding:16px;
background:rgba(10,10,20,.7);
backdrop-filter: blur(10px);
z-index:10;
border-bottom:1px solid #222;
}

/* ===== 模式切换 ===== */
.tabs{
display:flex;
gap:10px;
padding:10px 16px;
}

.tab{
padding:6px 12px;
border-radius:999px;
background:#1a1a26;
font-size:12px;
cursor:pointer;
opacity:.6;
}
.tab.active{opacity:1;background:#ff2d55;}

/* ===== 容器 ===== */
.container{padding:16px;padding-bottom:120px;}

/* ===== 卡片 ===== */
.card{
background:linear-gradient(135deg,#1a1a26,#0e0e18);
padding:14px;
border-radius:16px;
margin-bottom:12px;
border:1px solid #222;
}

/* ===== 输入 ===== */
input,textarea{
width:100%;
margin-top:8px;
padding:10px;
border-radius:10px;
border:none;
background:#141420;
color:#fff;
}

/* ===== 按钮 ===== */
button{
padding:10px 12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff2d55;
color:#fff;
}

/* ===== 时间线 ===== */
.timeline{
border-left:2px solid #ff2d55;
padding-left:16px;
margin-top:10px;
}

.item{
position:relative;
margin-bottom:14px;
cursor:pointer;
}

.dot{
position:absolute;
left:-20px;
top:12px;
width:10px;
height:10px;
background:#ff2d55;
border-radius:50%;
box-shadow:0 0 10px #ff2d55;
}

.small{opacity:.7;font-size:12px}

/* ===== 地图（巡演线） ===== */
.map{
position:relative;
height:300px;
background:radial-gradient(circle at center,#111,#05050a);
border-radius:16px;
overflow:hidden;
}

.city{
position:absolute;
padding:6px 10px;
background:#ff2d55;
border-radius:999px;
font-size:12px;
transform:translate(-50%,-50%);
}

.line{
position:absolute;
height:2px;
background:#ff2d55;
opacity:.4;
transform-origin:left;
}

/* ===== 沉浸页 ===== */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
flex-direction:column;
padding:20px;
overflow:auto;
z-index:99;
}

.modal h2{
margin-top:10px;
}

.close{
position:fixed;
top:20px;
right:20px;
background:#ff2d55;
border:none;
border-radius:50%;
width:40px;height:40px;
}

img{
width:100%;
border-radius:12px;
margin-top:10px;
}
</style>
</head>

<body>

<header>🎭 5525 · 回到那一天（V8 沉浸巡演版）</header>

<div class="tabs">
<div class="tab active" onclick="switchTab('timeline')">时间线</div>
<div class="tab" onclick="switchTab('map')">巡演地图</div>
</div>

<div class="container">

<!-- ===== 输入 ===== -->
<div class="card">
<h3>➕ 添加演出</h3>
<input id="title" placeholder="演出名称"/>
<input id="city" placeholder="城市（如 上海 / 东京）"/>
<input id="date" type="date"/>
<textarea id="note" placeholder="记忆 / 现场感受"></textarea>
<input id="img" placeholder="图片链接（可选）"/>
<button onclick="add()">加入巡演记忆</button>
</div>

<!-- ===== 时间线 ===== -->
<div id="timelineView"></div>

<!-- ===== 地图 ===== -->
<div id="mapView" style="display:none">
<div class="map" id="map"></div>
</div>

</div>

<!-- ===== 沉浸页 ===== -->
<div class="modal" id="modal">
<button class="close" onclick="closeModal()">×</button>
<div id="modalContent"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("v8") || "[]");

function save(){
localStorage.setItem("v8",JSON.stringify(data));
}

/* ===== 添加 ===== */
function add(){
const title=document.getElementById("title").value;
const city=document.getElementById("city").value;
const date=document.getElementById("date").value;
const note=document.getElementById("note").value;
const img=document.getElementById("img").value;

if(!title||!city) return;

data.unshift({title,city,date,note,img});
save();
render();
drawMap();
}

/* ===== 模式切换 ===== */
function switchTab(t){
document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
event.target.classList.add("active");

document.getElementById("timelineView").style.display = t==="timeline"?"block":"none";
document.getElementById("mapView").style.display = t==="map"?"block":"none";
}

/* ===== 时间线 ===== */
function render(){
const box=document.getElementById("timelineView");
box.innerHTML="";

data.forEach((d,i)=>{
box.innerHTML+=`
<div class="item" onclick="openModal(${i})">
<div class="dot"></div>
<div class="card">
<b>${d.title}</b>
<div class="small">📍 ${d.city}</div>
<div class="small">📅 ${d.date||""}</div>
<div class="small">${d.note||""}</div>
</div>
</div>`;
});
}

/* ===== 沉浸页 ===== */
function openModal(i){
const d=data[i];
document.getElementById("modal").style.display="flex";

document.getElementById("modalContent").innerHTML=`
<h2>${d.title}</h2>
<div>📍 ${d.city}</div>
<div>📅 ${d.date||""}</div>
<p style="opacity:.8">${d.note||""}</p>
${d.img?`<img src="${d.img}"/>`:""}
`;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* ===== 简易巡演地图 ===== */
function drawMap(){
const map=document.getElementById("map");
map.innerHTML="";

let cities=[...new Set(data.map(d=>d.city))];

let points={};
cities.forEach((c,i)=>{
let x=60+(i*60)%260;
let y=80+Math.floor(i/4)*70;

points[c]={x,y};

map.innerHTML+=`<div class="city" style="left:${x}px;top:${y}px">${c}</div>`;
});

let arr=cities;
for(let i=0;i<arr.length-1;i++){
let a=points[arr[i]];
let b=points[arr[i+1]];
if(!a||!b) continue;

let len=Math.hypot(b.x-a.x,b.y-a.y);
let ang=Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI;

map.innerHTML+=`
<div class="line"
style="left:${a.x}px;top:${a.y}px;width:${len}px;transform:rotate(${ang}deg)">
</div>`;
}
}

/* ===== init ===== */
render();
drawMap();

</script>

</body>
</html>
