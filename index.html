<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5525 演出人生 V2</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
    background:#0f0f12;
    color:#fff;
}

header{
    padding:18px;
    font-size:18px;
    font-weight:600;
    background:#1c1c22;
    position:sticky;
    top:0;
}

.container{
    padding:15px;
}

.card{
    background:#1c1c22;
    padding:12px;
    border-radius:14px;
    margin-bottom:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

input,textarea{
    width:100%;
    margin-top:6px;
    margin-bottom:10px;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#2a2a33;
    color:white;
}

button{
    padding:10px 12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-right:6px;
}

.btn-add{background:#ff3b5c;color:#fff;}
.btn-del{background:#444;color:#fff;}
.btn-edit{background:#2d7dff;color:#fff;}

.timeline{
    margin-top:15px;
}

.item-title{
    font-size:16px;
    font-weight:600;
}

.meta{
    font-size:12px;
    opacity:0.8;
    margin-top:4px;
}

.search{
    margin-bottom:10px;
}
</style>
</head>

<body>

<header>🎭 5525 演出人生 V2</header>

<div class="container">

<div class="card">
<h3>➕ 添加演出</h3>

<input id="title" placeholder="演出名称">
<input id="city" placeholder="城市 / 场馆">
<input id="date" type="date">
<textarea id="note" placeholder="记忆 / 心情"></textarea>

<button class="btn-add" onclick="addShow()">保存</button>
</div>

<div class="card search">
<input id="search" placeholder="🔍 搜索演出 / 城市" oninput="render()">
</div>

<div id="list" class="timeline"></div>

</div>

<script>
let shows = JSON.parse(localStorage.getItem("shows") || "[]");

function save(){
    localStorage.setItem("shows", JSON.stringify(shows));
}

function addShow(){
    let title = document.getElementById("title").value;
    let city = document.getElementById("city").value;
    let date = document.getElementById("date").value;
    let note = document.getElementById("note").value;

    if(!title) return;

    shows.unshift({title,city,date,note});
    save();
    clearForm();
    render();
}

function clearForm(){
    document.getElementById("title").value="";
    document.getElementById("city").value="";
    document.getElementById("date").value="";
    document.getElementById("note").value="";
}

function deleteShow(i){
    shows.splice(i,1);
    save();
    render();
}

function editShow(i){
    let s = shows[i];

    let title = prompt("修改演出名称", s.title);
    let city = prompt("修改城市/场馆", s.city);
    let date = prompt("修改日期", s.date);
    let note = prompt("修改心情", s.note);

    shows[i] = {title,city,date,note};
    save();
    render();
}

function render(){
    let list = document.getElementById("list");
    let keyword = document.getElementById("search").value.toLowerCase();

    list.innerHTML = "";

    shows
    .filter(s =>
        (s.title||"").toLowerCase().includes(keyword) ||
        (s.city||"").toLowerCase().includes(keyword)
    )
    .forEach((s,i)=>{
        list.innerHTML += `
        <div class="card">
            <div class="item-title">${s.title}</div>
            <div class="meta">📍 ${s.city || ""}</div>
            <div class="meta">📅 ${s.date || ""}</div>
            <div class="meta">💭 ${s.note || ""}</div>

            <div style="margin-top:10px;">
                <button class="btn-edit" onclick="editShow(${i})">编辑</button>
                <button class="btn-del" onclick="deleteShow(${i})">删除</button>
            </div>
        </div>
        `;
    });
}

render();
</script>

</body>
</html>
